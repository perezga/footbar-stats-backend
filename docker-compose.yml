# Backend only. Run from the backend/ directory:
#   docker network create footbar-net   # once, shared with the frontend
#   cp .env.example .env                 # fill in your Footbar credentials
#   docker compose up --build
#
# Requires TLS certs at backend/certs/ (npm run cert -w backend).

services:
  backend:
    build:
      context: ..                  # repo root — workspace deps are hoisted there
      dockerfile: backend/Dockerfile
    container_name: footbar-backend
    command: npm run dev -w backend
    env_file:
      - .env                       # FOOTBAR_CLIENT_ID / _SECRET / COOKIE_SECRET
    environment:
      HOST: 0.0.0.0                # bind all interfaces so the port is reachable
    ports:
      - "4000:4000"                # published so the browser OAuth callback works
    volumes:
      - ..:/app                    # live source for tsx watch
      - /app/node_modules          # keep the image's installed deps (native build)
      - /app/backend/node_modules
    networks:
      default:
        aliases:
          - backend                # frontend proxies to https://backend:4000

networks:
  default:
    name: footbar-net
    external: true
