# Backend only. Run from this directory:
#   export FOOTBAR_CLIENT_ID=… FOOTBAR_CLIENT_SECRET=… COOKIE_SECRET=…
#   docker compose up --build
#
# Fully self-contained: uses its own default network and publishes port 4000 on
# the host, so the frontend can reach it via host.docker.internal — no shared
# network needed. Secrets come from your shell env (below); TLS certs from
# ./certs (npm run cert).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: footbar-backend
    command: npm run dev
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      # Passed through from your shell — compose substitutes ${VAR} at `up`.
      FOOTBAR_CLIENT_ID: ${FOOTBAR_CLIENT_ID:?set FOOTBAR_CLIENT_ID in your environment}
      FOOTBAR_CLIENT_SECRET: ${FOOTBAR_CLIENT_SECRET:?set FOOTBAR_CLIENT_SECRET in your environment}
      COOKIE_SECRET: ${COOKIE_SECRET:?set COOKIE_SECRET in your environment}
      RFAF_USERNAME: ${RFAF_USERNAME:?set RFAF_USERNAME in your environment}
      RFAF_PASSWORD: ${RFAF_PASSWORD:?set RFAF_PASSWORD in your environment}
      # Footbar account for the daily background sync (headless login).
      FOOTBAR_USERNAME: ${FOOTBAR_USERNAME:-}
      FOOTBAR_PASSWORD: ${FOOTBAR_PASSWORD:-}
      SYNC_INTERVAL_HOURS: ${SYNC_INTERVAL_HOURS:-24}
      HOST: 0.0.0.0                # bind all interfaces so the port is reachable
      # Default to localhost; override (e.g. with the server's LAN IP) to allow
      # access from another machine. Must match the Redirect URI registered with
      # Footbar. See "LAN access" in the README.
      REDIRECT_URI: ${REDIRECT_URI:-https://localhost:4000/auth/callback}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"                # published so the browser OAuth callback works
    volumes:
      - .:/app                     # live source for tsx watch
      - /app/node_modules          # keep the image's installed deps (native build)
